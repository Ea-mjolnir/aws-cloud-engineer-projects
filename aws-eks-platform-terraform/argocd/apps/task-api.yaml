apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: task-api
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/part-of: platform
    app.kubernetes.io/component: api
    environment: production
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd-image-updater.argoproj.io/image-list: task-api=288528696055.dkr.ecr.us-east-1.amazonaws.com/task-api
    argocd-image-updater.argoproj.io/task-api.update-strategy: semver
spec:
  project: platform
  
  source:
    repoURL: "https://github.com/Ea-mjolnir/aws-cloud-engineer-projects"
    targetRevision: HEAD
    path: aws-eks-platform-terraform/helm/task-api
    
    helm:
      releaseName: task-api
      valueFiles:
        - values.yaml
        - values-production.yaml
      
      parameters:
        - name: image.repository
          value: "288528696055.dkr.ecr.us-east-1.amazonaws.com/task-api"
        - name: image.tag
          value: "latest"
        - name: serviceAccount.annotations.eks\.amazonaws\.com/role-arn
          value: "arn:aws:iam::288528696055:role/eks-platform-production-task-api"
        - name: env.ENVIRONMENT
          value: "production"
        - name: env.AWS_REGION
          value: "us-east-1"
  
  destination:
    server: https://kubernetes.default.svc
    namespace: production
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
    
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  
  revisionHistoryLimit: 10
