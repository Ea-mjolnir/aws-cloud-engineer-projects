apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-of-apps
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/part-of: gitops
    argocd.argoproj.io/type: root
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: platform
  
  source:
    repoURL: "https://github.com/Ea-mjolnir/aws-cloud-engineer-projects"
    targetRevision: HEAD
    path: aws-eks-platform-terraform/argocd/apps
    directory:
      recurse: false
      include: "*.yaml"
      exclude: "app-of-apps.yaml"
    
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  
  revisionHistoryLimit: 10
  
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
    - group: autoscaling
      kind: HorizontalPodAutoscaler
      jsonPointers:
        - /spec/metrics/0/resource/target/averageUtilization
