apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/part-of: platform
    app.kubernetes.io/component: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: platform
  
  source:
    repoURL: "https://github.com/Ea-mjolnir/aws-cloud-engineer-projects"
    targetRevision: HEAD
    path: aws-eks-platform-terraform/monitoring
    
    helm:
      releaseName: monitoring-stack
      valueFiles:
        - values.yaml
  
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
    
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  
  revisionHistoryLimit: 10
