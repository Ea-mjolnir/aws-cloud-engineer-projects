apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: eks-platform
    managed-by: gitops
spec:
  description: Platform applications managed by GitOps
  
  sourceRepos:
    - "https://github.com/Ea-mjolnir/aws-cloud-engineer-projects"
    - "git@github.com:Ea-mjolnir/aws-cloud-engineer-projects.git"
  
  destinations:
    - namespace: production
      server: https://kubernetes.default.svc
    - namespace: staging
      server: https://kubernetes.default.svc
    - namespace: development
      server: https://kubernetes.default.svc
    - namespace: monitoring
      server: https://kubernetes.default.svc
    - namespace: argocd
      server: https://kubernetes.default.svc
    - namespace: ingress-nginx
      server: https://kubernetes.default.svc
    - namespace: external-secrets
      server: https://kubernetes.default.svc
    - namespace: cert-manager
      server: https://kubernetes.default.svc
  
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: "apiextensions.k8s.io"
      kind: CustomResourceDefinition
    - group: "rbac.authorization.k8s.io"
      kind: ClusterRole
    - group: "rbac.authorization.k8s.io"
      kind: ClusterRoleBinding
    - group: "networking.k8s.io"
      kind: IngressClass
  
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
  
  roles:
    - name: read-only
      description: Read access to platform applications
      policies:
        - p, proj:platform:read-only, applications, get, platform/*, allow
        - p, proj:platform:read-only, logs, get, platform/*, allow
      groups:
        - developers
    - name: devops
      description: Full access to platform applications
      policies:
        - p, proj:platform:devops, applications, *, platform/*, allow
        - p, proj:platform:devops, logs, *, platform/*, allow
        - p, proj:platform:devops, exec, create, platform/*, allow
      groups:
        - devops
        - platform-team
