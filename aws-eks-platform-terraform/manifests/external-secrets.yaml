---
# =============================================================================
# External Secrets Operator Configuration
# =============================================================================
# Connects Kubernetes to AWS Secrets Manager via IRSA
# Pods get secrets without storing AWS credentials
# =============================================================================

# -----------------------------------------------------------------------------
# ClusterSecretStore (Available cluster-wide with namespace restrictions)
# -----------------------------------------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
  labels:
    app: external-secrets
    managed-by: terraform
    component: secret-store
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
  conditions:
    - namespaces: ["production", "staging", "development", "argocd", "monitoring", "ingress-nginx"]
---
# -----------------------------------------------------------------------------
# Namespaced SecretStore (Fallback for specific namespaces)
# -----------------------------------------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-manager
  namespace: external-secrets
  labels:
    app: external-secrets
    managed-by: terraform
    component: secret-store
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
---
# -----------------------------------------------------------------------------
# Task API Secrets (Database Credentials)
# -----------------------------------------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: task-api-secrets
  namespace: production
  labels:
    app: task-api
    component: secrets
    managed-by: terraform
  annotations:
    reloader.stakater.com/match: "true"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: task-api-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app: task-api
          component: database-credentials
        annotations:
          eks.amazonaws.com/skip-annotation-validation: "true"
      data:
        DB_PASSWORD: "{{ .db_password }}"
        DB_USERNAME: "{{ .db_username }}"
        DB_HOST: "{{ .db_host }}"
        DB_NAME: "{{ .db_name }}"
        DB_PORT: "{{ .db_port }}"
  data:
    - secretKey: db_password
      remoteRef:
        key: eks-platform/task-api
        property: db_password
    - secretKey: db_username
      remoteRef:
        key: eks-platform/task-api
        property: db_username
    - secretKey: db_host
      remoteRef:
        key: eks-platform/task-api
        property: db_host
    - secretKey: db_name
      remoteRef:
        key: eks-platform/task-api
        property: db_name
    - secretKey: db_port
      remoteRef:
        key: eks-platform/task-api
        property: db_port
  dataFrom:
    - extract:
        key: eks-platform/task-api
---
# -----------------------------------------------------------------------------
# Task API Redis Cache Secrets
# -----------------------------------------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: task-api-redis-secrets
  namespace: production
  labels:
    app: task-api
    component: secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: task-api-redis-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app: task-api
          component: redis-credentials
      data:
        REDIS_HOST: "{{ .host }}"
        REDIS_PORT: "{{ .port }}"
        REDIS_PASSWORD: "{{ .password }}"
  data:
    - secretKey: host
      remoteRef:
        key: eks-platform/task-api/redis
        property: host
    - secretKey: port
      remoteRef:
        key: eks-platform/task-api/redis
        property: port
    - secretKey: password
      remoteRef:
        key: eks-platform/task-api/redis
        property: password
---
# -----------------------------------------------------------------------------
# ArgoCD Secrets (GitHub Token for Private Repos)
# -----------------------------------------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: argocd-repo-creds
  namespace: argocd
  labels:
    app: argocd
    component: secrets
    argocd.argoproj.io/secret-type: repository
spec:
  refreshInterval: 12h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: argocd-repo-creds
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      metadata:
        labels:
          app: argocd
          component: repo-credentials
          argocd.argoproj.io/secret-type: repo-creds
      data:
        type: "git"
        url: "{{ .repo_url }}"
        username: "{{ .username }}"
        password: "{{ .token }}"
  data:
    - secretKey: username
      remoteRef:
        key: eks-platform/argocd/github
        property: username
    - secretKey: token
      remoteRef:
        key: eks-platform/argocd/github
        property: token
    - secretKey: repo_url
      remoteRef:
        key: eks-platform/argocd/github
        property: repo_url
---
# -----------------------------------------------------------------------------
# ArgoCD SSO Secrets (Dex/OIDC Configuration)
# -----------------------------------------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: argocd-sso-secrets
  namespace: argocd
  labels:
    app: argocd
    component: secrets
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: argocd-sso-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: client-id
      remoteRef:
        key: eks-platform/argocd/sso
        property: client_id
    - secretKey: client-secret
      remoteRef:
        key: eks-platform/argocd/sso
        property: client_secret
---
# -----------------------------------------------------------------------------
# Monitoring Secrets (Grafana Admin Credentials)
# -----------------------------------------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-admin
  namespace: monitoring
  labels:
    app: grafana
    component: secrets
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: grafana-admin-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app: grafana
          component: admin-credentials
      data:
        admin-user: "{{ .admin_user }}"
        admin-password: "{{ .admin_password }}"
  data:
    - secretKey: admin_password
      remoteRef:
        key: eks-platform/monitoring/grafana
        property: admin_password
    - secretKey: admin_user
      remoteRef:
        key: eks-platform/monitoring/grafana
        property: admin_user
---
# -----------------------------------------------------------------------------
# Prometheus Alertmanager Secrets (Slack/PagerDuty Integration)
# -----------------------------------------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: alertmanager-secrets
  namespace: monitoring
  labels:
    app: prometheus
    component: secrets
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: alertmanager-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: slack-webhook-url
      remoteRef:
        key: eks-platform/monitoring/alertmanager
        property: slack_webhook_url
    - secretKey: pagerduty-routing-key
      remoteRef:
        key: eks-platform/monitoring/alertmanager
        property: pagerduty_routing_key
---
# -----------------------------------------------------------------------------
# Ingress TLS Certificates (Wildcard Certificate)
# -----------------------------------------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: wildcard-tls
  namespace: ingress-nginx
  labels:
    app: ingress-nginx
    component: tls
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: wildcard-tls-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: kubernetes.io/tls
      metadata:
        labels:
          app: ingress-nginx
          component: tls-certificate
        annotations:
          cert-manager.io/issuer-kind: "ClusterIssuer"
          cert-manager.io/issuer-name: "letsencrypt-prod"
  data:
    - secretKey: tls.crt
      remoteRef:
        key: eks-platform/tls/wildcard
        property: certificate
    - secretKey: tls.key
      remoteRef:
        key: eks-platform/tls/wildcard
        property: private_key
---
# -----------------------------------------------------------------------------
# AWS Credentials for Cross-Account Access (Optional)
# -----------------------------------------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: aws-cross-account-creds
  namespace: production
  labels:
    app: platform
    component: aws-credentials
spec:
  refreshInterval: 12h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: aws-cross-account-creds
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app: platform
          component: aws-credentials
      data:
        AWS_ACCESS_KEY_ID: "{{ .access_key }}"
        AWS_SECRET_ACCESS_KEY: "{{ .secret_key }}"
        AWS_DEFAULT_REGION: "{{ .region }}"
  data:
    - secretKey: access_key
      remoteRef:
        key: eks-platform/aws/cross-account
        property: access_key_id
    - secretKey: secret_key
      remoteRef:
        key: eks-platform/aws/cross-account
        property: secret_access_key
    - secretKey: region
      remoteRef:
        key: eks-platform/aws/cross-account
        property: region
---
# =============================================================================
# AWS Secrets Manager Structure Required:
# =============================================================================
# 
# eks-platform/task-api:
#   - db_password
#   - db_username  
#   - db_host
#   - db_name
#   - db_port
#
# eks-platform/task-api/redis:
#   - host
#   - port
#   - password
#
# eks-platform/argocd/github:
#   - username
#   - token
#   - repo_url
#
# eks-platform/argocd/sso:
#   - client_id
#   - client_secret
#
# eks-platform/monitoring/grafana:
#   - admin_user
#   - admin_password
#
# eks-platform/monitoring/alertmanager:
#   - slack_webhook_url
#   - pagerduty_routing_key
#
# eks-platform/tls/wildcard:
#   - certificate
#   - private_key
#
# eks-platform/aws/cross-account:
#   - access_key_id
#   - secret_access_key
#   - region
#
# =============================================================================
