# Prometheus Stack values for EKS platform
global:
  nodeSelector:
    role: system

alertmanager:
  enabled: true
  replicas: 2
  config:
    global:
      slack_api_url: ''  # Set via External Secrets
    route:
      group_by: ['alertname', 'cluster', 'service']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: 'slack-notifications'
    receivers:
      - name: 'slack-notifications'
        slack_configs:
          - channel: '#alerts'
            title: '{{ .GroupLabels.alertname }}'
            text: '{{ .CommonAnnotations.description }}'

prometheus:
  enabled: true
  replicas: 2
  retention: 7d
  retentionSize: 20GB
  storageSpec:
    volumeClaimTemplate:
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
        storageClassName: ebs-sc
  additionalScrapeConfigs:
    - job_name: 'task-api'
      scrape_interval: 30s
      kubernetes_sd_configs:
        - role: pod
          namespaces:
            names:
              - production
      relabel_configs:
        - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
          action: keep
          regex: task-api

grafana:
  enabled: true
  replicas: 2
  persistence:
    enabled: true
    size: 10Gi
    storageClassName: ebs-sc
  ingress:
    enabled: true
    annotations:
      kubernetes.io/ingress.class: alb
      alb.ingress.kubernetes.io/scheme: internet-facing
    hosts:
      - grafana.eks-platform.local
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: 'default'
          orgId: 1
          folder: ''
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default
  dashboards:
    default:
      kubernetes-cluster:
        gnetId: 315
        revision: 3
        datasource: Prometheus
      node-exporter:
        gnetId: 1860
        revision: 32
        datasource: Prometheus

prometheusOperator:
  replicas: 2
  admissionWebhooks:
    enabled: true
    patch:
      enabled: true

kube-state-metrics:
  enabled: true

nodeExporter:
  enabled: true

kubelet:
  enabled: true

kubeApiServer:
  enabled: true

kubeControllerManager:
  enabled: true

coreDns:
  enabled: true

kubeEtcd:
  enabled: false

kubeScheduler:
  enabled: true

kubeProxy:
  enabled: true
