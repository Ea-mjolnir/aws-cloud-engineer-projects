name: Deploy — Build, Push & Blue-Green Deploy

on:
  push:
    branches: [main]
    paths:
      - 'aws-ci_cd-pipeline-terraform/**'
  workflow_dispatch:
    inputs:
      force_deploy:
        description: Force deployment even if no code changes
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION:     ${{ secrets.AWS_REGION }}
  ECR_REPO:       ${{ secrets.ECR_REPOSITORY }}
  PROJECT_NAME:   cicd-pipeline

jobs:

  build-and-scan:
    name: Build & Security Scan
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      image_uri: ${{ steps.meta.outputs.uri }}

    steps:
      - uses: actions/checkout@v4

      - name: Generate image metadata
        id: meta
        run: |
          TAG="v${{ github.run_number }}-$(echo ${{ github.sha }} | cut -c1-7)"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "uri=${{ secrets.ECR_REGISTRY }}/${{ env.ECR_REPO }}:$TAG" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:    ${{ secrets.AWS_ROLE_ARN }}
          aws-region:        ${{ env.AWS_REGION }}
          role-session-name: github-actions-deploy

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        working-directory: ./aws-ci_cd-pipeline-terraform
        run: |
          docker build \
            --build-arg APP_VERSION=${{ steps.meta.outputs.tag }} \
            --build-arg BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
            --build-arg GIT_COMMIT=${{ github.sha }} \
            -t ${{ steps.meta.outputs.uri }} \
            -f app/Dockerfile \
            app/

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta.outputs.uri }}
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true
          trivyignores: aws-ci_cd-pipeline-terraform/.trivyignore

      - name: Push image to ECR
        run: docker push ${{ steps.meta.outputs.uri }}

      - name: Tag as latest
        run: |
          docker tag ${{ steps.meta.outputs.uri }} \
            ${{ secrets.ECR_REGISTRY }}/${{ env.ECR_REPO }}:latest
          docker push ${{ secrets.ECR_REGISTRY }}/${{ env.ECR_REPO }}:latest

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: build-and-scan

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:    ${{ secrets.AWS_ROLE_ARN }}
          aws-region:        ${{ env.AWS_REGION }}
          role-session-name: github-actions-tf

      - name: Terraform Init & Apply
        working-directory: ./aws-ci_cd-pipeline-terraform/terraform/
        run: |
          terraform init
          terraform apply \
            -var="github_org=${{ github.repository_owner }}" \
            -auto-approve \
            -no-color

  blue-green-deploy:
    name: Blue-Green Deploy
    runs-on: ubuntu-latest
    needs: [build-and-scan, terraform-apply]

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:    ${{ secrets.AWS_ROLE_ARN }}
          aws-region:        ${{ env.AWS_REGION }}
          role-session-name: github-actions-deploy

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Run blue-green deployment
        working-directory: ./aws-ci_cd-pipeline-terraform
        env:
          PROJECT_NAME: ${{ env.PROJECT_NAME }}
          AWS_REGION:   ${{ env.AWS_REGION }}
        run: |
          chmod +x scripts/blue_green_deploy.sh
          ./scripts/blue_green_deploy.sh ${{ needs.build-and-scan.outputs.image_tag }}

      - name: Get ALB endpoint
        id: alb
        run: |
          ENDPOINT=$(aws elbv2 describe-load-balancers \
            --names "${PROJECT_NAME}-alb" \
            --query 'LoadBalancers[0].DNSName' \
            --output text)
          echo "endpoint=http://$ENDPOINT" >> $GITHUB_OUTPUT

      - name: Post-deployment health checks
        working-directory: ./aws-ci_cd-pipeline-terraform
        run: |
          chmod +x scripts/health_check.sh
          ./scripts/health_check.sh ${{ steps.alb.outputs.endpoint }}

      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ Deployment ${{ needs.build-and-scan.outputs.image_tag }} successful"
          echo "🌍 Live at: ${{ steps.alb.outputs.endpoint }}"

      - name: Rollback on failure
        if: failure()
        run: |
          echo "❌ Deployment failed — initiating rollback"
          CLUSTER="${PROJECT_NAME}-cluster"
          SERVICE="${PROJECT_NAME}-api"
          PREV_TASK=$(aws ecs describe-services \
            --cluster "$CLUSTER" \
            --services "$SERVICE" \
            --query 'services[0].deployments[?status==`PRIMARY`].taskDefinition' \
            --output text)
          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service "$SERVICE" \
            --task-definition "$PREV_TASK"
          echo "↩️  Rolled back to $PREV_TASK"

  post-deploy-validation:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: blue-green-deploy

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Get ALB endpoint
        id: alb
        run: |
          ENDPOINT=$(aws elbv2 describe-load-balancers \
            --names "cicd-pipeline-alb" \
            --query 'LoadBalancers[0].DNSName' \
            --output text)
          echo "endpoint=http://$ENDPOINT" >> $GITHUB_OUTPUT

      - name: Run smoke tests
        run: |
          BASE="${{ steps.alb.outputs.endpoint }}"
          echo "Running smoke tests against $BASE"
          curl -sf "$BASE/health" | jq .
          echo "✅ All smoke tests passed"
