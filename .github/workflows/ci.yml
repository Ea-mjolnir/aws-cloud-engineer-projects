name: CI — Code Quality & Security

on:
  pull_request:
    branches: [main]
    paths:
      - 'aws-ci_cd-pipeline-terraform/**'
  push:
    branches: [main]
    paths:
      - 'aws-ci_cd-pipeline-terraform/**'

permissions:
  contents: read
  id-token: write

env:
  PYTHON_VERSION: "3.12"
  TF_VERSION:     "1.7.5"

jobs:

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        working-directory: ./aws-ci_cd-pipeline-terraform
        run: |
          pip install -r app/requirements.txt
          pip install -r app/requirements-dev.txt

      - name: Lint with flake8
        working-directory: ./aws-ci_cd-pipeline-terraform
        run: flake8 app/ --max-line-length=120 --exclude=app/tests/,app/venv

      - name: Format check with black
        working-directory: ./aws-ci_cd-pipeline-terraform
        run: black --check app/ --exclude 'app/venv|app/__pycache__'

      - name: Run tests
        working-directory: ./aws-ci_cd-pipeline-terraform
        run: PYTHONPATH=./app pytest app/tests/ -v --junitxml=app/test-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: aws-ci_cd-pipeline-terraform/app/test-results.xml

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
      - uses: actions/checkout@v4

      - name: SAST — Bandit
        working-directory: ./aws-ci_cd-pipeline-terraform
        run: |
          pip install bandit
          bandit -r app/ -ll -x app/tests/ --format json -o bandit-report.json || true
          cat bandit-report.json

      - name: Dependency check — Safety
        working-directory: ./aws-ci_cd-pipeline-terraform
        run: |
          pip install safety
          safety scan -r app/requirements.txt --output json > safety-report.json || true
          cat safety-report.json

      - name: Terraform security — tfsec
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: ./aws-ci_cd-pipeline-terraform/terraform/
          soft_fail: true

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            aws-ci_cd-pipeline-terraform/bandit-report.json
            aws-ci_cd-pipeline-terraform/safety-report.json

  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:    ${{ secrets.AWS_ROLE_ARN }}
          aws-region:        ${{ secrets.AWS_REGION }}
          role-session-name: github-actions-ci

      - name: Terraform Init
        working-directory: ./aws-ci_cd-pipeline-terraform/terraform/
        run: terraform init

      - name: Terraform Validate
        working-directory: ./aws-ci_cd-pipeline-terraform/terraform/
        run: terraform validate

      - name: Terraform Plan
        working-directory: ./aws-ci_cd-pipeline-terraform/terraform/
        run: |
          terraform plan \
            -var="github_repo=${{ github.event.repository.name }}" \
            -var="github_org=${{ github.repository_owner }}" \
            -out=tfplan \
            -no-color 2>&1 | tee plan-output.txt

      - name: Upload plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: aws-ci_cd-pipeline-terraform/terraform/plan-output.txt
          retention-days: 5
