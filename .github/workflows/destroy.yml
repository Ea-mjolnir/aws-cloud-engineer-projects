name: Destroy Infrastructure

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type DESTROY to confirm
        required: true

permissions:
  contents: read
  id-token: write

jobs:
  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'DESTROY'

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:    ${{ secrets.AWS_ROLE_ARN }}
          aws-region:        ${{ secrets.AWS_REGION }}
          role-session-name: github-actions-destroy

      # ── Step 1: ECS — scale down and delete service first ───────────────────
      - name: Delete ECS service
        run: |
          echo "=== Checking ECS service ==="
          STATUS=$(aws ecs describe-services \
            --cluster cicd-pipeline-cluster \
            --services cicd-pipeline-api \
            --region ${{ secrets.AWS_REGION }} \
            --query 'services[0].status' \
            --output text 2>/dev/null || echo "MISSING")

          if [ "$STATUS" = "MISSING" ] || [ "$STATUS" = "INACTIVE" ] || [ "$STATUS" = "None" ]; then
            echo "ECS service does not exist, skipping"
            exit 0
          fi

          echo "Found ECS service with status: $STATUS"
          echo "Scaling down to 0..."
          aws ecs update-service \
            --cluster cicd-pipeline-cluster \
            --service cicd-pipeline-api \
            --desired-count 0 \
            --region ${{ secrets.AWS_REGION }}

          echo "Waiting for tasks to drain..."
          for i in $(seq 1 24); do
            RUNNING=$(aws ecs describe-services \
              --cluster cicd-pipeline-cluster \
              --services cicd-pipeline-api \
              --region ${{ secrets.AWS_REGION }} \
              --query 'services[0].runningCount' \
              --output text 2>/dev/null || echo "0")
            echo "  Running tasks: $RUNNING (attempt $i/24)"
            [ "$RUNNING" = "0" ] && break
            sleep 10
          done

          echo "Deleting ECS service..."
          aws ecs delete-service \
            --cluster cicd-pipeline-cluster \
            --service cicd-pipeline-api \
            --force \
            --region ${{ secrets.AWS_REGION }}

          echo "Verifying ECS service deletion..."
          for i in $(seq 1 12); do
            STATUS=$(aws ecs describe-services \
              --cluster cicd-pipeline-cluster \
              --services cicd-pipeline-api \
              --region ${{ secrets.AWS_REGION }} \
              --query 'services[0].status' \
              --output text 2>/dev/null || echo "INACTIVE")
            echo "  Status: $STATUS (attempt $i/12)"
            [ "$STATUS" = "INACTIVE" ] && echo "✅ ECS service deleted" && exit 0
            sleep 10
          done
          echo "❌ ECS service still exists after timeout"
          exit 1

      # ── Step 2: ECS cluster ──────────────────────────────────────────────────
      - name: Delete ECS cluster
        run: |
          echo "=== Checking ECS cluster ==="
          STATUS=$(aws ecs describe-clusters \
            --clusters cicd-pipeline-cluster \
            --region ${{ secrets.AWS_REGION }} \
            --query 'clusters[0].status' \
            --output text 2>/dev/null || echo "MISSING")

          if [ "$STATUS" = "MISSING" ] || [ "$STATUS" = "INACTIVE" ] || [ "$STATUS" = "None" ]; then
            echo "ECS cluster does not exist, skipping"
            exit 0
          fi

          echo "Deleting ECS cluster..."
          aws ecs delete-cluster \
            --cluster cicd-pipeline-cluster \
            --region ${{ secrets.AWS_REGION }}

          echo "Verifying ECS cluster deletion..."
          for i in $(seq 1 12); do
            STATUS=$(aws ecs describe-clusters \
              --clusters cicd-pipeline-cluster \
              --region ${{ secrets.AWS_REGION }} \
              --query 'clusters[0].status' \
              --output text 2>/dev/null || echo "INACTIVE")
            echo "  Status: $STATUS (attempt $i/12)"
            [ "$STATUS" = "INACTIVE" ] && echo "✅ ECS cluster deleted" && exit 0
            sleep 10
          done
          echo "❌ ECS cluster still exists after timeout"
          exit 1

      # ── Step 3: ALB listeners ────────────────────────────────────────────────
      - name: Delete ALB listeners
        run: |
          echo "=== Checking ALB ==="
          ALB_ARN=$(aws elbv2 describe-load-balancers \
            --names cicd-pipeline-alb \
            --region ${{ secrets.AWS_REGION }} \
            --query 'LoadBalancers[0].LoadBalancerArn' \
            --output text 2>/dev/null || echo "")

          if [ -z "$ALB_ARN" ] || [ "$ALB_ARN" = "None" ]; then
            echo "ALB does not exist, skipping listeners"
            exit 0
          fi

          echo "Found ALB: $ALB_ARN"
          LISTENERS=$(aws elbv2 describe-listeners \
            --load-balancer-arn "$ALB_ARN" \
            --region ${{ secrets.AWS_REGION }} \
            --query 'Listeners[].ListenerArn' \
            --output text 2>/dev/null || echo "")

          if [ -z "$LISTENERS" ]; then
            echo "No listeners found"
            exit 0
          fi

          for LISTENER_ARN in $LISTENERS; do
            echo "Deleting listener: $LISTENER_ARN"
            aws elbv2 delete-listener \
              --listener-arn "$LISTENER_ARN" \
              --region ${{ secrets.AWS_REGION }}
            echo "✅ Listener deleted"
          done

          echo "Verifying all listeners gone..."
          REMAINING=$(aws elbv2 describe-listeners \
            --load-balancer-arn "$ALB_ARN" \
            --region ${{ secrets.AWS_REGION }} \
            --query 'length(Listeners)' \
            --output text 2>/dev/null || echo "0")
          [ "$REMAINING" = "0" ] \
            && echo "✅ All listeners deleted" \
            || { echo "❌ $REMAINING listeners still exist"; exit 1; }

      # ── Step 4: ALB ──────────────────────────────────────────────────────────
      - name: Delete ALB
        run: |
          echo "=== Checking ALB ==="
          ALB_ARN=$(aws elbv2 describe-load-balancers \
            --names cicd-pipeline-alb \
            --region ${{ secrets.AWS_REGION }} \
            --query 'LoadBalancers[0].LoadBalancerArn' \
            --output text 2>/dev/null || echo "")

          if [ -z "$ALB_ARN" ] || [ "$ALB_ARN" = "None" ]; then
            echo "ALB does not exist, skipping"
            exit 0
          fi

          echo "Deleting ALB: $ALB_ARN"
          aws elbv2 delete-load-balancer \
            --load-balancer-arn "$ALB_ARN" \
            --region ${{ secrets.AWS_REGION }}

          echo "Waiting for ALB to be fully deleted..."
          for i in $(seq 1 24); do
            STATE=$(aws elbv2 describe-load-balancers \
              --load-balancer-arns "$ALB_ARN" \
              --region ${{ secrets.AWS_REGION }} \
              --query 'LoadBalancers[0].State.Code' \
              --output text 2>/dev/null || echo "deleted")
            echo "  State: $STATE (attempt $i/24)"
            [ "$STATE" = "deleted" ] || [ -z "$STATE" ] \
              && echo "✅ ALB deleted" && exit 0
            sleep 15
          done
          echo "❌ ALB still exists after timeout"
          exit 1

      # ── Step 5: Target groups ────────────────────────────────────────────────
      - name: Delete target groups
        run: |
          echo "=== Checking target groups ==="
          for TG_NAME in cicd-pipeline-blue cicd-pipeline-green; do
            TG_ARN=$(aws elbv2 describe-target-groups \
              --names "$TG_NAME" \
              --region ${{ secrets.AWS_REGION }} \
              --query 'TargetGroups[0].TargetGroupArn' \
              --output text 2>/dev/null || echo "")

            if [ -z "$TG_ARN" ] || [ "$TG_ARN" = "None" ]; then
              echo "Target group $TG_NAME does not exist, skipping"
              continue
            fi

            echo "Deleting target group $TG_NAME: $TG_ARN"
            aws elbv2 delete-target-group \
              --target-group-arn "$TG_ARN" \
              --region ${{ secrets.AWS_REGION }}

            echo "Verifying target group $TG_NAME deleted..."
            for i in $(seq 1 6); do
              RESULT=$(aws elbv2 describe-target-groups \
                --target-group-arns "$TG_ARN" \
                --region ${{ secrets.AWS_REGION }} \
                --query 'TargetGroups[0].TargetGroupArn' \
                --output text 2>/dev/null || echo "deleted")
              echo "  Result: $RESULT (attempt $i/6)"
              [ "$RESULT" = "deleted" ] || [ -z "$RESULT" ] \
                && echo "✅ Target group $TG_NAME deleted" && break
              [ "$i" = "6" ] \
                && { echo "❌ Target group $TG_NAME still exists"; exit 1; }
              sleep 5
            done
          done

      # ── Step 6: NAT gateway ──────────────────────────────────────────────────
      - name: Delete NAT gateway
        run: |
          echo "=== Checking NAT gateway ==="
          NAT_ID=$(aws ec2 describe-nat-gateways \
            --filter \
              "Name=state,Values=available,pending" \
              "Name=tag:Project,Values=cicd-pipeline" \
            --region ${{ secrets.AWS_REGION }} \
            --query 'NatGateways[0].NatGatewayId' \
            --output text 2>/dev/null || echo "")

          if [ -z "$NAT_ID" ] || [ "$NAT_ID" = "None" ]; then
            echo "NAT gateway does not exist, skipping"
            exit 0
          fi

          echo "Deleting NAT gateway: $NAT_ID"
          aws ec2 delete-nat-gateway \
            --nat-gateway-id "$NAT_ID" \
            --region ${{ secrets.AWS_REGION }}

          echo "Waiting for NAT gateway to be fully deleted..."
          for i in $(seq 1 24); do
            STATE=$(aws ec2 describe-nat-gateways \
              --nat-gateway-ids "$NAT_ID" \
              --region ${{ secrets.AWS_REGION }} \
              --query 'NatGateways[0].State' \
              --output text 2>/dev/null || echo "deleted")
            echo "  State: $STATE (attempt $i/24)"
            [ "$STATE" = "deleted" ] && echo "✅ NAT gateway deleted" && exit 0
            sleep 15
          done
          echo "❌ NAT gateway still exists after timeout"
          exit 1

      # ── Step 7: EIP ──────────────────────────────────────────────────────────
      - name: Release EIP
        run: |
          echo "=== Checking EIP ==="
          EIP_ALLOC=$(aws ec2 describe-addresses \
            --filters "Name=tag:Project,Values=cicd-pipeline" \
            --region ${{ secrets.AWS_REGION }} \
            --query 'Addresses[0].AllocationId' \
            --output text 2>/dev/null || echo "")

          if [ -z "$EIP_ALLOC" ] || [ "$EIP_ALLOC" = "None" ]; then
            echo "EIP does not exist, skipping"
            exit 0
          fi

          echo "Releasing EIP: $EIP_ALLOC"
          aws ec2 release-address \
            --allocation-id "$EIP_ALLOC" \
            --region ${{ secrets.AWS_REGION }}

          echo "Verifying EIP released..."
          RESULT=$(aws ec2 describe-addresses \
            --allocation-ids "$EIP_ALLOC" \
            --region ${{ secrets.AWS_REGION }} \
            --query 'Addresses[0].AllocationId' \
            --output text 2>/dev/null || echo "released")
          [ "$RESULT" = "released" ] || [ -z "$RESULT" ] \
            && echo "✅ EIP released" \
            || { echo "❌ EIP still exists"; exit 1; }

      # ── Step 8: Security groups ──────────────────────────────────────────────
      - name: Delete security groups
        run: |
          echo "=== Checking security groups ==="
          VPC_ID=$(aws ec2 describe-vpcs \
            --filters "Name=cidr,Values=10.1.0.0/16" \
            --region ${{ secrets.AWS_REGION }} \
            --query 'Vpcs[0].VpcId' \
            --output text 2>/dev/null || echo "")

          if [ -z "$VPC_ID" ] || [ "$VPC_ID" = "None" ]; then
            echo "VPC does not exist, no security groups to delete"
            exit 0
          fi

          SG_IDS=$(aws ec2 describe-security-groups \
            --filters "Name=vpc-id,Values=$VPC_ID" \
            --region ${{ secrets.AWS_REGION }} \
            --query 'SecurityGroups[?GroupName!=`default`].GroupId' \
            --output text 2>/dev/null || echo "")

          if [ -z "$SG_IDS" ]; then
            echo "No non-default security groups found"
            exit 0
          fi

          for SG_ID in $SG_IDS; do
            echo "Deleting security group: $SG_ID"
            aws ec2 delete-security-group \
              --group-id "$SG_ID" \
              --region ${{ secrets.AWS_REGION }}

            RESULT=$(aws ec2 describe-security-groups \
              --group-ids "$SG_ID" \
              --region ${{ secrets.AWS_REGION }} \
              --query 'SecurityGroups[0].GroupId' \
              --output text 2>/dev/null || echo "deleted")
            [ "$RESULT" = "deleted" ] || [ -z "$RESULT" ] \
              && echo "✅ Security group $SG_ID deleted" \
              || { echo "❌ Security group $SG_ID still exists"; exit 1; }
          done

      # ── Step 9: Subnets ──────────────────────────────────────────────────────
      - name: Delete subnets
        run: |
          echo "=== Checking subnets ==="
          VPC_ID=$(aws ec2 describe-vpcs \
            --filters "Name=cidr,Values=10.1.0.0/16" \
            --region ${{ secrets.AWS_REGION }} \
            --query 'Vpcs[0].VpcId' \
            --output text 2>/dev/null || echo "")

          if [ -z "$VPC_ID" ] || [ "$VPC_ID" = "None" ]; then
            echo "VPC does not exist, no subnets to delete"
            exit 0
          fi

          SUBNET_IDS=$(aws ec2 describe-subnets \
            --filters "Name=vpc-id,Values=$VPC_ID" \
            --region ${{ secrets.AWS_REGION }} \
            --query 'Subnets[].SubnetId' \
            --output text 2>/dev/null || echo "")

          if [ -z "$SUBNET_IDS" ]; then
            echo "No subnets found"
            exit 0
          fi

          for SUBNET_ID in $SUBNET_IDS; do
            echo "Deleting subnet: $SUBNET_ID"
            aws ec2 delete-subnet \
              --subnet-id "$SUBNET_ID" \
              --region ${{ secrets.AWS_REGION }}

            RESULT=$(aws ec2 describe-subnets \
              --subnet-ids "$SUBNET_ID" \
              --region ${{ secrets.AWS_REGION }} \
              --query 'Subnets[0].SubnetId' \
              --output text 2>/dev/null || echo "deleted")
            [ "$RESULT" = "deleted" ] || [ -z "$RESULT" ] \
              && echo "✅ Subnet $SUBNET_ID deleted" \
              || { echo "❌ Subnet $SUBNET_ID still exists"; exit 1; }
          done

      # ── Step 10: Route tables ────────────────────────────────────────────────
      - name: Delete route tables
        run: |
          echo "=== Checking route tables ==="
          VPC_ID=$(aws ec2 describe-vpcs \
            --filters "Name=cidr,Values=10.1.0.0/16" \
            --region ${{ secrets.AWS_REGION }} \
            --query 'Vpcs[0].VpcId' \
            --output text 2>/dev/null || echo "")

          if [ -z "$VPC_ID" ] || [ "$VPC_ID" = "None" ]; then
            echo "VPC does not exist, no route tables to delete"
            exit 0
          fi

          RT_IDS=$(aws ec2 describe-route-tables \
            --filters "Name=vpc-id,Values=$VPC_ID" \
            --region ${{ secrets.AWS_REGION }} \
            --query 'RouteTables[?Associations[?Main==`false`]||length(Associations)==`0`].RouteTableId' \
            --output text 2>/dev/null || echo "")

          if [ -z "$RT_IDS" ]; then
            echo "No non-main route tables found"
            exit 0
          fi

          for RT_ID in $RT_IDS; do
            echo "Deleting route table: $RT_ID"
            aws ec2 delete-route-table \
              --route-table-id "$RT_ID" \
              --region ${{ secrets.AWS_REGION }}

            RESULT=$(aws ec2 describe-route-tables \
              --route-table-ids "$RT_ID" \
              --region ${{ secrets.AWS_REGION }} \
              --query 'RouteTables[0].RouteTableId' \
              --output text 2>/dev/null || echo "deleted")
            [ "$RESULT" = "deleted" ] || [ -z "$RESULT" ] \
              && echo "✅ Route table $RT_ID deleted" \
              || { echo "❌ Route table $RT_ID still exists"; exit 1; }
          done

      # ── Step 11: Internet gateway ────────────────────────────────────────────
      - name: Delete internet gateway
        run: |
          echo "=== Checking internet gateway ==="
          VPC_ID=$(aws ec2 describe-vpcs \
            --filters "Name=cidr,Values=10.1.0.0/16" \
            --region ${{ secrets.AWS_REGION }} \
            --query 'Vpcs[0].VpcId' \
            --output text 2>/dev/null || echo "")

          if [ -z "$VPC_ID" ] || [ "$VPC_ID" = "None" ]; then
            echo "VPC does not exist, no IGW to delete"
            exit 0
          fi

          IGW_ID=$(aws ec2 describe-internet-gateways \
            --filters "Name=attachment.vpc-id,Values=$VPC_ID" \
            --region ${{ secrets.AWS_REGION }} \
            --query 'InternetGateways[0].InternetGatewayId' \
            --output text 2>/dev/null || echo "")

          if [ -z "$IGW_ID" ] || [ "$IGW_ID" = "None" ]; then
            echo "Internet gateway does not exist, skipping"
            exit 0
          fi

          echo "Detaching internet gateway: $IGW_ID"
          aws ec2 detach-internet-gateway \
            --internet-gateway-id "$IGW_ID" \
            --vpc-id "$VPC_ID" \
            --region ${{ secrets.AWS_REGION }}

          echo "Deleting internet gateway: $IGW_ID"
          aws ec2 delete-internet-gateway \
            --internet-gateway-id "$IGW_ID" \
            --region ${{ secrets.AWS_REGION }}

          RESULT=$(aws ec2 describe-internet-gateways \
            --internet-gateway-ids "$IGW_ID" \
            --region ${{ secrets.AWS_REGION }} \
            --query 'InternetGateways[0].InternetGatewayId' \
            --output text 2>/dev/null || echo "deleted")
          [ "$RESULT" = "deleted" ] || [ -z "$RESULT" ] \
            && echo "✅ Internet gateway deleted" \
            || { echo "❌ Internet gateway still exists"; exit 1; }

      # ── Step 12: VPC ─────────────────────────────────────────────────────────
      - name: Delete VPC
        run: |
          echo "=== Checking VPC ==="
          VPC_ID=$(aws ec2 describe-vpcs \
            --filters "Name=cidr,Values=10.1.0.0/16" \
            --region ${{ secrets.AWS_REGION }} \
            --query 'Vpcs[0].VpcId' \
            --output text 2>/dev/null || echo "")

          if [ -z "$VPC_ID" ] || [ "$VPC_ID" = "None" ]; then
            echo "VPC does not exist, skipping"
            exit 0
          fi

          echo "Deleting VPC: $VPC_ID"
          aws ec2 delete-vpc \
            --vpc-id "$VPC_ID" \
            --region ${{ secrets.AWS_REGION }}

          RESULT=$(aws ec2 describe-vpcs \
            --vpc-ids "$VPC_ID" \
            --region ${{ secrets.AWS_REGION }} \
            --query 'Vpcs[0].VpcId' \
            --output text 2>/dev/null || echo "deleted")
          [ "$RESULT" = "deleted" ] || [ -z "$RESULT" ] \
            && echo "✅ VPC deleted" \
            || { echo "❌ VPC still exists"; exit 1; }

      # ── Step 13: ECR ─────────────────────────────────────────────────────────
      - name: Delete ECR repository
        run: |
          echo "=== Checking ECR repository ==="
          RESULT=$(aws ecr describe-repositories \
            --repository-names cicd-pipeline/api \
            --region ${{ secrets.AWS_REGION }} \
            --query 'repositories[0].repositoryName' \
            --output text 2>/dev/null || echo "")

          if [ -z "$RESULT" ] || [ "$RESULT" = "None" ]; then
            echo "ECR repository does not exist, skipping"
            exit 0
          fi

          echo "Deleting ECR repository (including all images)..."
          aws ecr delete-repository \
            --repository-name cicd-pipeline/api \
            --force \
            --region ${{ secrets.AWS_REGION }}

          RESULT=$(aws ecr describe-repositories \
            --repository-names cicd-pipeline/api \
            --region ${{ secrets.AWS_REGION }} \
            --query 'repositories[0].repositoryName' \
            --output text 2>/dev/null || echo "deleted")
          [ "$RESULT" = "deleted" ] || [ -z "$RESULT" ] \
            && echo "✅ ECR repository deleted" \
            || { echo "❌ ECR repository still exists"; exit 1; }

      # ── Step 14: IAM roles ───────────────────────────────────────────────────
      - name: Delete IAM roles
        run: |
          echo "=== Checking IAM roles ==="
          for ROLE in cicd-pipeline-ecs-execution cicd-pipeline-ecs-task cicd-pipeline-github-actions; do
            RESULT=$(aws iam get-role \
              --role-name "$ROLE" \
              --query 'Role.RoleName' \
              --output text 2>/dev/null || echo "")

            if [ -z "$RESULT" ] || [ "$RESULT" = "None" ]; then
              echo "Role $ROLE does not exist, skipping"
              continue
            fi

            echo "Cleaning policies from role: $ROLE"
            for POLICY_ARN in $(aws iam list-attached-role-policies \
              --role-name "$ROLE" \
              --query 'AttachedPolicies[].PolicyArn' \
              --output text 2>/dev/null); do
              echo "  Detaching: $POLICY_ARN"
              aws iam detach-role-policy \
                --role-name "$ROLE" \
                --policy-arn "$POLICY_ARN"
            done

            for POLICY_NAME in $(aws iam list-role-policies \
              --role-name "$ROLE" \
              --query 'PolicyNames[]' \
              --output text 2>/dev/null); do
              echo "  Deleting inline policy: $POLICY_NAME"
              aws iam delete-role-policy \
                --role-name "$ROLE" \
                --policy-name "$POLICY_NAME"
            done

            echo "Deleting role: $ROLE"
            aws iam delete-role --role-name "$ROLE"

            RESULT=$(aws iam get-role \
              --role-name "$ROLE" \
              --query 'Role.RoleName' \
              --output text 2>/dev/null || echo "deleted")
            [ "$RESULT" = "deleted" ] || [ -z "$RESULT" ] \
              && echo "✅ Role $ROLE deleted" \
              || { echo "❌ Role $ROLE still exists"; exit 1; }
          done

      # ── Step 15: OIDC provider ───────────────────────────────────────────────
      - name: Delete OIDC provider
        run: |
          echo "=== Checking OIDC provider ==="
          RESULT=$(aws iam get-open-id-connect-provider \
            --open-id-connect-provider-arn \
            arn:aws:iam::288528696055:oidc-provider/token.actions.githubusercontent.com \
            --query 'Url' \
            --output text 2>/dev/null || echo "")

          if [ -z "$RESULT" ] || [ "$RESULT" = "None" ]; then
            echo "OIDC provider does not exist, skipping"
            exit 0
          fi

          echo "Deleting OIDC provider..."
          aws iam delete-open-id-connect-provider \
            --open-id-connect-provider-arn \
            arn:aws:iam::288528696055:oidc-provider/token.actions.githubusercontent.com

          RESULT=$(aws iam get-open-id-connect-provider \
            --open-id-connect-provider-arn \
            arn:aws:iam::288528696055:oidc-provider/token.actions.githubusercontent.com \
            --query 'Url' \
            --output text 2>/dev/null || echo "deleted")
          [ "$RESULT" = "deleted" ] || [ -z "$RESULT" ] \
            && echo "✅ OIDC provider deleted" \
            || { echo "❌ OIDC provider still exists"; exit 1; }

      # ── Step 16: CloudWatch ──────────────────────────────────────────────────
      - name: Delete CloudWatch resources
        run: |
          echo "=== Checking CloudWatch resources ==="
          for ALARM in cicd-pipeline-5xx-errors cicd-pipeline-ecs-cpu-high; do
            RESULT=$(aws cloudwatch describe-alarms \
              --alarm-names "$ALARM" \
              --region ${{ secrets.AWS_REGION }} \
              --query 'MetricAlarms[0].AlarmName' \
              --output text 2>/dev/null || echo "")
            if [ -n "$RESULT" ] && [ "$RESULT" != "None" ]; then
              echo "Deleting alarm: $ALARM"
              aws cloudwatch delete-alarms \
                --alarm-names "$ALARM" \
                --region ${{ secrets.AWS_REGION }}
              RESULT=$(aws cloudwatch describe-alarms \
                --alarm-names "$ALARM" \
                --region ${{ secrets.AWS_REGION }} \
                --query 'MetricAlarms[0].AlarmName' \
                --output text 2>/dev/null || echo "deleted")
              [ "$RESULT" = "deleted" ] || [ -z "$RESULT" ] \
                && echo "✅ Alarm $ALARM deleted" \
                || { echo "❌ Alarm $ALARM still exists"; exit 1; }
            else
              echo "Alarm $ALARM does not exist, skipping"
            fi
          done

          RESULT=$(aws cloudwatch get-dashboard \
            --dashboard-name cicd-pipeline-overview \
            --region ${{ secrets.AWS_REGION }} \
            --query 'DashboardName' \
            --output text 2>/dev/null || echo "")
          if [ -n "$RESULT" ] && [ "$RESULT" != "None" ]; then
            echo "Deleting dashboard..."
            aws cloudwatch delete-dashboards \
              --dashboard-names cicd-pipeline-overview \
              --region ${{ secrets.AWS_REGION }}
            echo "✅ Dashboard deleted"
          else
            echo "Dashboard does not exist, skipping"
          fi

          RESULT=$(aws logs describe-log-groups \
            --log-group-name-prefix /ecs/cicd-pipeline \
            --region ${{ secrets.AWS_REGION }} \
            --query 'logGroups[0].logGroupName' \
            --output text 2>/dev/null || echo "")
          if [ -n "$RESULT" ] && [ "$RESULT" != "None" ]; then
            echo "Deleting log group..."
            aws logs delete-log-group \
              --log-group-name /ecs/cicd-pipeline \
              --region ${{ secrets.AWS_REGION }}
            RESULT=$(aws logs describe-log-groups \
              --log-group-name-prefix /ecs/cicd-pipeline \
              --region ${{ secrets.AWS_REGION }} \
              --query 'logGroups[0].logGroupName' \
              --output text 2>/dev/null || echo "deleted")
            [ "$RESULT" = "deleted" ] || [ -z "$RESULT" ] \
              && echo "✅ Log group deleted" \
              || { echo "❌ Log group still exists"; exit 1; }
          else
            echo "Log group does not exist, skipping"
          fi

      # ── Step 17: S3 state bucket ─────────────────────────────────────────────
      - name: Delete S3 state bucket
        run: |
          echo "=== Checking S3 state bucket ==="
          if ! aws s3 ls s3://aws-ci-cd-pipeline-terraform-state \
              --region ${{ secrets.AWS_REGION }} 2>/dev/null; then
            echo "S3 bucket does not exist, skipping"
            exit 0
          fi

          echo "Deleting all object versions..."
          VERSIONS=$(aws s3api list-object-versions \
            --bucket aws-ci-cd-pipeline-terraform-state \
            --region ${{ secrets.AWS_REGION }} \
            --query '{Objects: Versions[].{Key:Key,VersionId:VersionId}}' \
            --output json 2>/dev/null)
          COUNT=$(echo "$VERSIONS" | python3 -c "import sys,json; d=json.load(sys.stdin); print(len(d.get('Objects') or []))" 2>/dev/null || echo "0")
          if [ "$COUNT" -gt 0 ]; then
            aws s3api delete-objects \
              --bucket aws-ci-cd-pipeline-terraform-state \
              --delete "$VERSIONS" \
              --region ${{ secrets.AWS_REGION }}
          fi

          echo "Deleting all delete markers..."
          MARKERS=$(aws s3api list-object-versions \
            --bucket aws-ci-cd-pipeline-terraform-state \
            --region ${{ secrets.AWS_REGION }} \
            --query '{Objects: DeleteMarkers[].{Key:Key,VersionId:VersionId}}' \
            --output json 2>/dev/null)
          COUNT=$(echo "$MARKERS" | python3 -c "import sys,json; d=json.load(sys.stdin); print(len(d.get('Objects') or []))" 2>/dev/null || echo "0")
          if [ "$COUNT" -gt 0 ]; then
            aws s3api delete-objects \
              --bucket aws-ci-cd-pipeline-terraform-state \
              --delete "$MARKERS" \
              --region ${{ secrets.AWS_REGION }}
          fi

          echo "Deleting bucket..."
          aws s3 rb s3://aws-ci-cd-pipeline-terraform-state \
            --force \
            --region ${{ secrets.AWS_REGION }}

          if aws s3 ls s3://aws-ci-cd-pipeline-terraform-state \
              --region ${{ secrets.AWS_REGION }} 2>/dev/null; then
            echo "❌ S3 bucket still exists"
            exit 1
          fi
          echo "✅ S3 bucket deleted"

      # ── Step 18: DynamoDB ────────────────────────────────────────────────────
      - name: Delete DynamoDB lock table
        run: |
          echo "=== Checking DynamoDB table ==="
          RESULT=$(aws dynamodb describe-table \
            --table-name terraform-locks \
            --region ${{ secrets.AWS_REGION }} \
            --query 'Table.TableStatus' \
            --output text 2>/dev/null || echo "")

          if [ -z "$RESULT" ] || [ "$RESULT" = "None" ]; then
            echo "DynamoDB table does not exist, skipping"
            exit 0
          fi

          echo "Deleting DynamoDB table..."
          aws dynamodb delete-table \
            --table-name terraform-locks \
            --region ${{ secrets.AWS_REGION }}

          echo "Waiting for DynamoDB table deletion..."
          for i in $(seq 1 12); do
            RESULT=$(aws dynamodb describe-table \
              --table-name terraform-locks \
              --region ${{ secrets.AWS_REGION }} \
              --query 'Table.TableStatus' \
              --output text 2>/dev/null || echo "deleted")
            echo "  Status: $RESULT (attempt $i/12)"
            [ "$RESULT" = "deleted" ] || [ -z "$RESULT" ] \
              && echo "✅ DynamoDB table deleted" && exit 0
            sleep 5
          done
          echo "❌ DynamoDB table still exists"
          exit 1

      # ── Final hard verification of everything ────────────────────────────────
      - name: Final verification — confirm everything is gone
        run: |
          echo "=========================================="
          echo "FINAL VERIFICATION — checking AWS directly"
          echo "=========================================="
          ISSUES=0

          # ALB
          ALB=$(aws elbv2 describe-load-balancers \
            --names cicd-pipeline-alb \
            --region ${{ secrets.AWS_REGION }} \
            --query 'LoadBalancers[0].LoadBalancerArn' \
            --output text 2>/dev/null || echo "")
          [ -z "$ALB" ] || [ "$ALB" = "None" ] \
            && echo "✅ ALB — gone" \
            || { echo "❌ ALB — STILL EXISTS: $ALB"; ISSUES=$((ISSUES+1)); }

          # Target groups
          for TG in cicd-pipeline-blue cicd-pipeline-green; do
            TG_RESULT=$(aws elbv2 describe-target-groups \
              --names "$TG" \
              --region ${{ secrets.AWS_REGION }} \
              --query 'TargetGroups[0].TargetGroupArn' \
              --output text 2>/dev/null || echo "")
            [ -z "$TG_RESULT" ] || [ "$TG_RESULT" = "None" ] \
              && echo "✅ Target group $TG — gone" \
              || { echo "❌ Target group $TG — STILL EXISTS"; ISSUES=$((ISSUES+1)); }
          done

          # ECS
          CLUSTER=$(aws ecs describe-clusters \
            --clusters cicd-pipeline-cluster \
            --region ${{ secrets.AWS_REGION }} \
            --query 'clusters[0].status' \
            --output text 2>/dev/null || echo "INACTIVE")
          [ "$CLUSTER" = "INACTIVE" ] || [ -z "$CLUSTER" ] || [ "$CLUSTER" = "None" ] \
            && echo "✅ ECS cluster — gone" \
            || { echo "❌ ECS cluster — STILL EXISTS: $CLUSTER"; ISSUES=$((ISSUES+1)); }

          # VPC
          VPC=$(aws ec2 describe-vpcs \
            --filters "Name=cidr,Values=10.1.0.0/16" \
            --region ${{ secrets.AWS_REGION }} \
            --query 'Vpcs[0].VpcId' \
            --output text 2>/dev/null || echo "")
          [ -z "$VPC" ] || [ "$VPC" = "None" ] \
            && echo "✅ VPC — gone" \
            || { echo "❌ VPC — STILL EXISTS: $VPC"; ISSUES=$((ISSUES+1)); }

          # ECR
          ECR=$(aws ecr describe-repositories \
            --repository-names cicd-pipeline/api \
            --region ${{ secrets.AWS_REGION }} \
            --query 'repositories[0].repositoryName' \
            --output text 2>/dev/null || echo "")
          [ -z "$ECR" ] || [ "$ECR" = "None" ] \
            && echo "✅ ECR repository — gone" \
            || { echo "❌ ECR repository — STILL EXISTS"; ISSUES=$((ISSUES+1)); }

          # IAM roles
          for ROLE in cicd-pipeline-ecs-execution cicd-pipeline-ecs-task cicd-pipeline-github-actions; do
            ROLE_RESULT=$(aws iam get-role \
              --role-name "$ROLE" \
              --query 'Role.RoleName' \
              --output text 2>/dev/null || echo "")
            [ -z "$ROLE_RESULT" ] || [ "$ROLE_RESULT" = "None" ] \
              && echo "✅ IAM role $ROLE — gone" \
              || { echo "❌ IAM role $ROLE — STILL EXISTS"; ISSUES=$((ISSUES+1)); }
          done

          # S3
          if aws s3 ls s3://aws-ci-cd-pipeline-terraform-state \
              --region ${{ secrets.AWS_REGION }} 2>/dev/null; then
            echo "❌ S3 bucket — STILL EXISTS"
            ISSUES=$((ISSUES+1))
          else
            echo "✅ S3 bucket — gone"
          fi

          # DynamoDB
          DDB=$(aws dynamodb describe-table \
            --table-name terraform-locks \
            --region ${{ secrets.AWS_REGION }} \
            --query 'Table.TableStatus' \
            --output text 2>/dev/null || echo "")
          [ -z "$DDB" ] || [ "$DDB" = "None" ] \
            && echo "✅ DynamoDB table — gone" \
            || { echo "❌ DynamoDB table — STILL EXISTS: $DDB"; ISSUES=$((ISSUES+1)); }

          # NAT gateway
          NAT=$(aws ec2 describe-nat-gateways \
            --filter \
              "Name=state,Values=available,pending,deleting" \
              "Name=tag:Project,Values=cicd-pipeline" \
            --region ${{ secrets.AWS_REGION }} \
            --query 'NatGateways[0].NatGatewayId' \
            --output text 2>/dev/null || echo "")
          [ -z "$NAT" ] || [ "$NAT" = "None" ] \
            && echo "✅ NAT gateway — gone" \
            || { echo "❌ NAT gateway — STILL EXISTS: $NAT"; ISSUES=$((ISSUES+1)); }

          echo "=========================================="
          if [ "$ISSUES" -eq 0 ]; then
            echo "✅ ALL RESOURCES SUCCESSFULLY DESTROYED"
            echo "No AWS charges should be incurred going forward"
          else
            echo "❌ $ISSUES RESOURCE(S) STILL EXIST IN AWS"
            echo "Check the AWS console and delete them manually"
            exit 1
          fi
          echo "=========================================="
